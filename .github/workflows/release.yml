name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: cortex
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: cortex
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: cortex
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: cortex.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          "target/${{ matrix.target }}/release/${{ matrix.binary }}" --version

      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" cortex
          tar -czf "dist/cortex-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" cortex

      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" cortex.exe
          Compress-Archive -Path cortex.exe -DestinationPath "dist/cortex-${env:GITHUB_REF_NAME}-${{ matrix.target }}.zip" -Force

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: cortex-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum cortex-* > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
